name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run backend test suite
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          GARTH_HOME: ${{ runner.temp }}/garth
          PYTHONPATH: "backend"
        run: uv run pytest backend/tests

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://127.0.0.1:8000/api/v1"
          INTERNAL_API_BASE_URL: "http://127.0.0.1:8000/api/v1"
        run: npm run build

  security-checks:
    name: Security checks (advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install repo dependencies
        run: uv sync --frozen --dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build backend image for Trivy
        run: docker build -f backend/Dockerfile -t garmin-platform-backend:latest .

      - name: Build frontend image for Trivy
        run: docker build -f frontend/Dockerfile -t garmin-platform-frontend:latest .

      - name: Run dependency audit
        continue-on-error: true
        run: ./infra/scripts/dependency_audit.sh

      - name: Run Trivy scan
        continue-on-error: true
        run: ./infra/scripts/trivy_scan.sh

      - name: Advisory summary
        if: always()
        run: |
          echo "Security checks are advisory for now."
          echo "Backend tests and frontend build remain the blocking CI gates."
          echo "Review this job's logs before deployment and tighten it later after Task 71 and Task 72."
