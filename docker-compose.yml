x-backend-common: &backend-common
  build:
    context: .
    dockerfile: backend/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
  volumes:
    - ./data:/app/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  backend:
    <<: *backend-common
    container_name: garmin-platform-backend
    ports:
      - "${APP_PORT:-8000}:8000"

  worker:
    <<: *backend-common
    container_name: garmin-platform-worker
    profiles:
      - sync
    command: ["python", "-m", "app.workers.scheduled_sync"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: garmin-platform-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INTERNAL_API_BASE_URL: "http://backend:8000/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: garmin-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
